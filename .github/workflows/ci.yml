name: CI — Train & Test ML Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Set up Python 3.10
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Generate EDA Notebook
      run: python notebooks/create_notebook.py

    - name: Run ML Training Pipeline
      run: python train.py

    - name: Verify model artifacts
      run: |
        python -c "
        from pathlib import Path
        required = [
            'models/best_model.pkl',
            'models/logistic_regression.pkl',
            'models/random_forest.pkl',
            'models/gradient_boosting.pkl',
            'models/scaler.pkl',
            'models/results.json',
            'data/diabetes.csv',
        ]
        for f in required:
            assert Path(f).exists(), f'MISSING: {f}'
            print(f'  ✓ {f}')
        print('All model artifacts verified!')
        "

    - name: Smoke test prediction CLI
      run: |
        python predict.py --pregnancies 3 --glucose 120 --bp 70 --skin 23 \
                          --insulin 79 --bmi 32.0 --dpf 0.471 --age 33

    - name: Upload model artifacts
      uses: actions/upload-artifact@v3
      with:
        name: trained-models
        path: |
          models/
          data/diabetes.csv
          reports/figures/
